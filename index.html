<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dead Hang</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0f0f0e; --surface:#1a1a18; --surface2:#232320; --border:#2e2e2a;
  --text:#e8e6df; --muted:#6b6960; --accent:#c8f060; --accent2:#60d4c8;
  --warn:#f0a060; --danger:#f06060; --r:14px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:32px 20px 60px; max-width:400px; margin:0 auto; }

.setup { text-align:center; padding-top:60px; }
.setup h2 { font-size:24px; margin-bottom:8px; }
.setup p { font-size:14px; color:var(--muted); margin-bottom:28px; }
.setup input { width:100%; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:18px; font-family:'DM Sans',sans-serif; text-align:center; outline:none; margin-bottom:12px; }
.setup input:focus { border-color:var(--accent); }
.btn-setup { width:100%; padding:15px; background:var(--accent); color:#0f0f0e; border:none; border-radius:var(--r); font-size:16px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }

.main { display:none; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.user-name { font-size:20px; font-weight:600; }
.change-btn { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; }

.jokers-row { display:flex; align-items:center; gap:8px; margin-bottom:20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:12px 16px; }
.joker-label { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; flex:1; }
.joker-dots { display:flex; gap:6px; }
.jdot { width:18px; height:18px; border-radius:50%; }
.jdot.used { background:var(--danger); }
.jdot.avail { background:var(--warn); }
.jdot.empty { background:var(--surface2); border:1px solid var(--border); }
.joker-use-btn { font-size:12px; color:var(--warn); background:none; border:1px solid var(--warn); border-radius:8px; padding:4px 10px; cursor:pointer; font-family:'DM Sans',sans-serif; }
.joker-use-btn:disabled { opacity:0.3; cursor:not-allowed; }

.prize-banner { background:#1a2a0a; border:1px solid var(--accent); border-radius:var(--r); padding:20px; margin-bottom:16px; text-align:center; display:none; }
.prize-banner .pe { font-size:48px; margin-bottom:8px; }
.prize-banner .pt { font-size:18px; font-weight:600; color:var(--accent); }
.prize-banner .ps { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:4px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:24px 20px 20px; margin-bottom:16px; }
.tmsg { text-align:center; font-size:14px; font-weight:500; min-height:20px; margin-bottom:10px; color:var(--accent2); line-height:1.4; }
.tbig { font-family:'DM Mono',monospace; font-size:80px; font-weight:300; text-align:center; color:var(--text); letter-spacing:-0.02em; line-height:1; margin-bottom:8px; }
.tbig.running { color:var(--accent); }
.tbig.valid { color:var(--accent); }
.tbig.invalid { color:var(--danger); }
.pw { background:var(--surface2); border-radius:4px; height:5px; margin-bottom:6px; overflow:hidden; }
.pb { height:100%; border-radius:4px; background:var(--warn); transition:width 0.5s linear; }
.pb.over { background:var(--accent); }
.target-label { text-align:right; font-size:10px; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:16px; }
.btns { display:flex; gap:10px; }
.btn { flex:1; padding:14px; border-radius:12px; border:none; font-size:15px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:transform 0.1s; -webkit-tap-highlight-color:transparent; }
.btn:active { transform:scale(0.97); }
.bgo { background:var(--accent); color:#0f0f0e; }
.bstop { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.breset { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.btech { background:var(--surface2); color:var(--accent2); border:1px solid var(--accent2); font-size:13px; }

.result { border-radius:var(--r); padding:20px; margin-bottom:16px; display:none; text-align:center; }
.result.ok { background:#161d0e; border:1px solid var(--accent); }
.result.ko { background:#1a0e0e; border:1px solid var(--danger); }
.remoji { font-size:40px; margin-bottom:8px; }
.rtitle { font-size:18px; font-weight:600; margin-bottom:4px; }
.rsub { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:4px; }
.reminder { margin-top:12px; padding:12px; background:rgba(255,255,255,0.04); border-radius:10px; font-size:13px; color:var(--accent2); line-height:1.5; }
.bwa { width:100%; padding:13px; background:#25d366; color:white; border:none; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:10px; }
.bdel { width:100%; padding:11px; background:none; color:var(--danger); border:1px solid var(--danger); border-radius:12px; font-size:13px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:8px; }

.stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; }
.stat.rec { border-color:var(--accent2); }
.slabel { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px; }
.sval { font-size:26px; font-weight:500; font-family:'DM Mono',monospace; color:var(--accent); line-height:1; }
.stat.rec .sval { color:var(--accent2); }
.ssub { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:3px; }

.htitle { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); font-family:'DM Mono',monospace; margin-bottom:10px; margin-top:8px; }
.hgrid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:24px; }
.hday { width:36px; height:40px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:2px; }
.hday.done { background:#161d0e; border-color:var(--accent); }
.hday.joker { background:#1a1500; border-color:var(--warn); }
.hday.today { border-color:var(--accent2); }
.hday span { font-size:9px; font-family:'DM Mono',monospace; color:var(--muted); }
.hday.done span { color:var(--accent); }
.hday.joker span { color:var(--warn); }
.hdot { width:5px; height:5px; border-radius:50%; background:var(--border); }
.hday.done .hdot { background:var(--accent); }
.hday.joker .hdot { background:var(--warn); }
.htime { font-size:8px; font-family:'DM Mono',monospace; color:var(--accent); }

.pull-input { width:100%; padding:16px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--accent); font-size:48px; font-family:'DM Mono',monospace; text-align:center; outline:none; margin-bottom:12px; }
.pull-input:focus { border-color:var(--accent); }

.divider { border:none; border-top:1px solid var(--border); margin:24px 0; }

.notif { position:fixed; top:16px; left:50%; transform:translateX(-50%) translateY(-60px); background:var(--surface); border:1px solid var(--accent); border-radius:12px; padding:12px 20px; font-size:13px; color:var(--accent); font-family:'DM Mono',monospace; z-index:99; transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; max-width:90vw; text-align:center; }
.notif.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="setup" id="setup">
  <h2>Dead Hang</h2>
  <p>Escribe tu nombre para empezar</p>
  <input type="text" id="ninput" placeholder="Tu nombre" maxlength="20" autocomplete="off">
  <button class="btn-setup" onclick="saveName()">Empezar</button>
</div>

<div class="main" id="main">
  <div class="header">
    <div class="user-name" id="uname-display"></div>
    <button class="change-btn" onclick="changeName()">cambiar nombre</button>
  </div>

  <div class="jokers-row">
    <div class="joker-label">Comodines<br><span style="font-size:10px">3 por racha</span></div>
    <div class="joker-dots" id="jdots"></div>
    <button class="joker-use-btn" id="jbtn" onclick="useJoker()">Usar hoy</button>
  </div>

  <div class="prize-banner" id="prize-banner">
    <div class="pe">🏆</div>
    <div class="pt">30 dias conseguidos!</div>
    <div class="ps" id="prize-sub"></div>
  </div>

  <div class="card">
    <div class="tmsg" id="tmsg"></div>
    <div class="tbig" id="clock">0:00</div>
    <div class="pw"><div class="pb" id="pb" style="width:0%"></div></div>
    <div class="target-label">objetivo: 2:00</div>
    <div class="btns">
      <button class="btn bgo" id="bgo" onclick="startStop()">Iniciar</button>
      <button class="btn breset" onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="result" id="hang-result">
    <div class="remoji" id="hr-emoji"></div>
    <div class="rtitle" id="hr-title"></div>
    <div class="rsub" id="hr-sub"></div>
    <div class="reminder" id="hr-reminder" style="display:none">Haz una captura y mandala a papa por WhatsApp</div>
    <button class="bwa" id="hr-wa" style="display:none" onclick="sendHangWA()">Abrir WhatsApp</button>
    <button class="bdel" id="hr-del" style="display:none" onclick="deleteHangToday()">Borrar intento de hoy y repetir</button>
  </div>

  <div class="stats" id="hang-stats"></div>
  <div class="htitle">Dead hang - ultimos 30 dias</div>
  <div class="hgrid" id="hang-hgrid"></div>

  <hr class="divider">
  <div class="htitle">Dominadas</div>

  <div class="card">
    <div style="font-size:13px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:10px;text-align:center">Cuantas has hecho hoy?</div>
    <input type="number" class="pull-input" id="pull-input" min="0" max="200" placeholder="0">
    <div class="btns">
      <button class="btn bgo" onclick="savePullups()">Guardar</button>
      <button class="btn btech" onclick="speakPullupTech()">Como hacerlas</button>
    </div>
  </div>

  <div class="result" id="pull-result">
    <div class="remoji">✅</div>
    <div class="rtitle" id="pr-title"></div>
    <div class="rsub" id="pr-sub"></div>
    <div class="reminder">Haz una captura y mandala a papa por WhatsApp</div>
    <button class="bwa" onclick="sendPullWA()">Abrir WhatsApp</button>
    <button class="bdel" onclick="deletePullToday()">Borrar dominadas de hoy</button>
  </div>

  <div class="stats" id="pull-stats"></div>
  <div class="htitle">Dominadas - ultimos 30 dias</div>
  <div class="hgrid" id="pull-hgrid"></div>
</div>

<div class="notif" id="notif"></div>

<script>
var STORAGE = 'dh4_';
var TARGET = 60;
var TARGET2 = 120;
var MAX_JOKERS = 3;
var PRIZE_DAYS = 30;

var HANG_MSGS = [
  {s:15,  m:'15 segundos. Hombros abajo, omoplatos hacia los bolsillos traseros.'},
  {s:30,  m:'30 segundos. El cuerpo aguanta mas de lo que crees. Core apretado.'},
  {s:45,  m:'45 segundos. Aprieta. No te sueltes. Pies sin tocar el suelo.'},
  {s:60,  m:'Un minuto. Valido. Ahora a por mas. Respira, no contengas el aire.'},
  {s:75,  m:'75 segundos. Estas ardiendo. No pares. Hombros activos.'},
  {s:90,  m:'Minuto y medio. Muy pocos llegan aqui. Tu si. Columna recta, no arquees.'},
  {s:105, m:'15 segundos para el objetivo. Todo o nada. Aprieta el agarre al maximo.'},
  {s:120, m:'Dos minutos. Objetivo conseguido. Eres una bestia.'},
  {s:135, m:'Mas de dos minutos. Increible. Sigue si puedes.'},
  {s:150, m:'Dos minutos y medio. Esto ya es elite.'},
  {s:165, m:'Casi tres minutos. No existe limite para ti.'},
  {s:180, m:'Tres minutos. Leyenda absoluta.'},
];

var PULL_TECH = [
  'Agárrate a la barra con las palmas hacia fuera, separadas al ancho de los hombros.',
  'Cuerpo recto, core apretado. No balancees las piernas.',
  'Sube hasta que la barbilla supere la barra. Lleva el pecho hacia ella.',
  'Baja completamente hasta que los brazos queden estirados del todo. Eso es una repeticion completa.',
  'No hagas trampas con el recorrido. Media dominada no cuenta.',
  'Respira: inhala abajo, exhala al subir.',
  'Si tiemblas al bajar es normal. Eso tambien es entrenamiento.',
];

function fmt(s) { return Math.floor(s/60) + ':' + ('0' + s%60).slice(-2); }
function tkey() { return new Date().toLocaleDateString('en-CA', {timeZone:'Europe/Madrid'}); }

function loadUser(n) {
  try {
    var d = JSON.parse(localStorage.getItem(STORAGE + n));
    if (!d) d = {};
    if (!d.log) d.log = {};
    if (!d.best) d.best = 0;
    if (!d.bestStreak) d.bestStreak = 0;
    if (!d.pullLog) d.pullLog = {};
    if (!d.pullBest) d.pullBest = 0;
    return d;
  } catch(e) {
    return {log:{}, best:0, bestStreak:0, pullLog:{}, pullBest:0};
  }
}

function saveUser() {
  localStorage.setItem(STORAGE + uname, JSON.stringify(udata));
}

var uname = localStorage.getItem('dh_name4') || null;
var udata = null;
var timerSecs = 0, timerRunning = false, timerIv = null, timerStart = null, wakeLock = null, lastHangSecs = 0;

function speak(txt) {
  try {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'es-ES'; u.rate = 1.05; u.pitch = 1.1; u.volume = 1;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

function showNotif(msg) {
  var el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2800);
}

function saveName() {
  var v = document.getElementById('ninput').value.trim();
  if (!v) { showNotif('Escribe tu nombre'); return; }
  uname = v;
  localStorage.setItem('dh_name4', uname);
  udata = loadUser(uname);
  showMain();
}

function changeName() {
  if (!confirm('Cambiar nombre? Tus datos se conservan.')) return;
  localStorage.removeItem('dh_name4');
  document.getElementById('setup').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('ninput').value = '';
}

function showMain() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('uname-display').textContent = uname;
  renderAll();
}

function startStop() {
  if (timerRunning) { stopTimer(); return; }
  timerRunning = true;
  document.getElementById('bgo').textContent = 'Parar';
  document.getElementById('bgo').className = 'btn bstop';
  document.getElementById('clock').className = 'tbig running';
  document.getElementById('hang-result').style.display = 'none';
  document.getElementById('tmsg').textContent = '';
  timerStart = Date.now() - (timerSecs * 1000);
  if (navigator.wakeLock) {
    navigator.wakeLock.request('screen').then(function(l) { wakeLock = l; }).catch(function() {});
  }
  speak('Venga. Agarrate fuerte.');
  timerIv = setInterval(function() {
    timerSecs = Math.floor((Date.now() - timerStart) / 1000);
    document.getElementById('clock').textContent = fmt(timerSecs);
    var pct = Math.min(100, (timerSecs / TARGET2) * 100);
    document.getElementById('pb').style.width = pct + '%';
    if (timerSecs >= TARGET) document.getElementById('pb').className = 'pb over';
    var m = null;
    for (var i = 0; i < HANG_MSGS.length; i++) {
      if (HANG_MSGS[i].s === timerSecs) { m = HANG_MSGS[i]; break; }
    }
    if (m) { document.getElementById('tmsg').textContent = m.m; speak(m.m); }
  }, 500);
}

function stopTimer() {
  clearInterval(timerIv);
  timerRunning = false;
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('bgo').textContent = 'Iniciar';
  document.getElementById('bgo').className = 'btn bgo';
  lastHangSecs = timerSecs;
  var valid = timerSecs >= TARGET;
  if (valid) {
    var k = tkey();
    var prev = udata.log[k] ? udata.log[k].t : 0;
    if (timerSecs > prev) udata.log[k] = {t: timerSecs, type: 'done'};
    if (timerSecs > udata.best) udata.best = timerSecs;
    var streak = calcStreak();
    if (streak > udata.bestStreak) udata.bestStreak = streak;
    saveUser();
    speak('Bien hecho. ' + Math.floor(lastHangSecs/60) + ' minutos y ' + (lastHangSecs%60) + ' segundos. Apuntado.');
    checkPrize(streak);
  } else {
    speak('No ha llegado al minuto. La proxima vez aguanta mas.');
  }
  showHangResult(valid);
  renderAll();
}

function resetTimer() {
  clearInterval(timerIv);
  timerRunning = false; timerSecs = 0; timerStart = null;
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('bgo').textContent = 'Iniciar';
  document.getElementById('bgo').className = 'btn bgo';
  document.getElementById('clock').className = 'tbig';
  document.getElementById('clock').textContent = '0:00';
  document.getElementById('tmsg').textContent = '';
  document.getElementById('pb').style.width = '0%';
  document.getElementById('pb').className = 'pb';
  document.getElementById('hang-result').style.display = 'none';
}

function showHangResult(valid) {
  var el = document.getElementById('hang-result');
  el.style.display = 'block';
  el.className = 'result ' + (valid ? 'ok' : 'ko');
  document.getElementById('clock').className = 'tbig ' + (valid ? 'valid' : 'invalid');
  document.getElementById('hr-emoji').textContent = valid ? '✅' : '❌';
  var streak = calcStreak();
  if (valid) {
    var isRec = lastHangSecs >= udata.best;
    var over2 = lastHangSecs >= TARGET2;
    document.getElementById('hr-title').textContent = isRec ? 'Nuevo record! 🏆' : (over2 ? 'Objetivo conseguido! 💪' : 'Valido!');
    document.getElementById('hr-sub').textContent = fmt(lastHangSecs) + '  -  Racha: ' + streak + ' dia' + (streak!==1?'s':'');
    document.getElementById('hr-reminder').style.display = 'block';
    document.getElementById('hr-wa').style.display = 'block';
    document.getElementById('hr-del').style.display = 'block';
  } else {
    document.getElementById('hr-title').textContent = 'No valido - minimo 1:00';
    document.getElementById('hr-sub').textContent = fmt(lastHangSecs) + ' - faltan ' + fmt(TARGET - lastHangSecs);
    document.getElementById('hr-reminder').style.display = 'none';
    document.getElementById('hr-wa').style.display = 'none';
    document.getElementById('hr-del').style.display = 'none';
  }
}

function deleteHangToday() {
  if (!confirm('Borrar el intento de hoy para repetir?')) return;
  delete udata.log[tkey()];
  saveUser();
  document.getElementById('hang-result').style.display = 'none';
  resetTimer();
  renderAll();
  showNotif('Intento borrado - puedes repetir');
}

function sendHangWA() {
  var streak = calcStreak();
  var lines = ['Dead Hang - ' + uname, 'Tiempo: ' + fmt(lastHangSecs), 'Racha: ' + streak + ' dia' + (streak!==1?'s':''), 'Record: ' + (udata.best >= TARGET ? fmt(udata.best) : '-')];
  window.open('https://wa.me/?text=' + encodeURIComponent(lines.join('\n')), '_blank');
}

function calcStreak() {
  var s = 0;
  var d = new Date();
  var tk = tkey();
  while (true) {
    var k = d.toLocaleDateString('en-CA', {timeZone:'Europe/Madrid'});
    if (k === tk && !udata.log[k]) { d.setDate(d.getDate()-1); continue; }
    var entry = udata.log[k];
    if (entry && (entry.type === 'done' || entry.type === 'joker')) {
      s++; d.setDate(d.getDate()-1);
    } else break;
  }
  return s;
}

function getStreakJokers() {
  var days = [];
  var d = new Date();
  var tk = tkey();
  while (true) {
    var k = d.toLocaleDateString('en-CA', {timeZone:'Europe/Madrid'});
    if (k === tk && !udata.log[k]) { d.setDate(d.getDate()-1); continue; }
    var entry = udata.log[k];
    if (entry && (entry.type === 'done' || entry.type === 'joker')) {
      if (entry.type === 'joker') days.push(k);
      d.setDate(d.getDate()-1);
    } else break;
  }
  return days.length;
}

function useJoker() {
  var k = tkey();
  if (udata.log[k]) { showNotif('Hoy ya tienes algo registrado'); return; }
  var jokersUsed = getStreakJokers();
  if (jokersUsed >= MAX_JOKERS) { showNotif('Sin comodines disponibles'); return; }
  if (!confirm('Usar un comodin para hoy?')) return;
  udata.log[k] = {t: 0, type: 'joker'};
  var streak = calcStreak();
  if (streak > udata.bestStreak) udata.bestStreak = streak;
  saveUser();
  showNotif('Comodin usado - racha mantenida');
  renderAll();
}

function checkPrize(streak) {
  if (streak > 0 && streak % PRIZE_DAYS === 0) {
    document.getElementById('prize-banner').style.display = 'block';
    document.getElementById('prize-sub').textContent = streak + ' dias seguidos. Habla con papa para tu premio.';
    speak('Increible. ' + streak + ' dias seguidos. Has ganado un premio. Habla con papa.');
  }
}

function savePullups() {
  var val = parseInt(document.getElementById('pull-input').value);
  if (!val || val <= 0) { showNotif('Introduce un numero valido'); return; }
  var k = tkey();
  if (val > (udata.pullLog[k] || 0)) udata.pullLog[k] = val;
  if (val > udata.pullBest) udata.pullBest = val;
  saveUser();
  var isRec = val >= udata.pullBest;
  document.getElementById('pull-result').style.display = 'block';
  document.getElementById('pull-result').className = 'result ok';
  document.getElementById('pr-title').textContent = isRec ? 'Nuevo record de dominadas! 🏆' : 'Registrado!';
  document.getElementById('pr-sub').textContent = val + ' dominadas  -  Record: ' + udata.pullBest;
  renderPullStats();
  renderPullHistory();
  speak('Apuntado. ' + val + ' dominadas hoy.');
}

function deletePullToday() {
  if (!confirm('Borrar dominadas de hoy?')) return;
  delete udata.pullLog[tkey()];
  saveUser();
  document.getElementById('pull-result').style.display = 'none';
  document.getElementById('pull-input').value = '';
  renderPullStats();
  renderPullHistory();
  showNotif('Dominadas borradas');
}

function sendPullWA() {
  var k = tkey();
  var val = udata.pullLog[k] || 0;
  var lines = ['Dominadas - ' + uname, 'Hoy: ' + val, 'Record: ' + (udata.pullBest || '-')];
  window.open('https://wa.me/?text=' + encodeURIComponent(lines.join('\n')), '_blank');
}

function speakPullupTech() {
  var i = 0;
  speak(PULL_TECH[0]);
  var techIv = setInterval(function() {
    i++;
    if (i >= PULL_TECH.length) { clearInterval(techIv); return; }
    speak(PULL_TECH[i]);
  }, 4500);
}

function renderJokers() {
  var k = tkey();
  var todayEntry = udata.log[k];
  var used = getStreakJokers();
  var html = '';
  for (var i = 0; i < MAX_JOKERS; i++) {
    var cls = i < used ? 'used' : 'avail';
    html += '<div class="jdot ' + cls + '"></div>';
  }
  document.getElementById('jdots').innerHTML = html;
  var jbtn = document.getElementById('jbtn');
  jbtn.disabled = used >= MAX_JOKERS || !!todayEntry;
  jbtn.textContent = used < MAX_JOKERS ? 'Usar hoy' : 'Sin comodines';
}

function renderHangStats() {
  var streak = calcStreak();
  var tv = udata.log[tkey()];
  var todayTime = tv && tv.type === 'done' ? tv.t : 0;
  var todayJoker = tv && tv.type === 'joker';
  var todayColor = todayTime >= TARGET ? 'var(--accent)' : todayJoker ? 'var(--warn)' : 'var(--muted)';
  var todayVal = todayJoker ? 'Comodin' : (todayTime ? fmt(todayTime) : '-');
  var todaySub = todayJoker ? 'comodin' : (todayTime >= TARGET ? 'valido' : 'sin hacer');
  document.getElementById('hang-stats').innerHTML =
    '<div class="stat"><div class="slabel">Racha actual</div><div class="sval">' + streak + '</div><div class="ssub">dias seguidos</div></div>' +
    '<div class="stat rec"><div class="slabel">Racha record</div><div class="sval">' + (udata.bestStreak||0) + '</div><div class="ssub">mejor racha</div></div>' +
    '<div class="stat"><div class="slabel">Hoy</div><div class="sval" style="color:' + todayColor + '">' + todayVal + '</div><div class="ssub">' + todaySub + '</div></div>' +
    '<div class="stat rec"><div class="slabel">Record</div><div class="sval">' + (udata.best>=TARGET ? fmt(udata.best) : '-') + '</div><div class="ssub">mejor tiempo</div></div>';
}

function renderHangHistory() {
  var wrap = document.getElementById('hang-hgrid');
  wrap.innerHTML = '';
  var tk = tkey();
  var d = new Date(); d.setDate(d.getDate()-29);
  for (var i = 0; i < 30; i++) {
    var k = d.toLocaleDateString('en-CA', {timeZone:'Europe/Madrid'});
    var entry = udata.log[k];
    var isT = k === tk;
    var el = document.createElement('div');
    var cls = 'hday';
    if (entry && entry.type === 'done') cls += ' done';
    else if (entry && entry.type === 'joker') cls += ' joker';
    else if (isT) cls += ' today';
    el.className = cls;
    var extra = '';
    if (entry && entry.type === 'done' && entry.t) extra = '<span class="htime">' + fmt(entry.t) + '</span>';
    else if (entry && entry.type === 'joker') extra = '<span class="htime">J</span>';
    el.innerHTML = '<span>' + d.getDate() + '</span><div class="hdot"></div>' + extra;
    wrap.appendChild(el);
    d.setDate(d.getDate()+1);
  }
}

function renderPullStats() {
  var tv = udata.pullLog[tkey()] || 0;
  document.getElementById('pull-stats').innerHTML =
    '<div class="stat"><div class="slabel">Hoy</div><div class="sval" style="color:' + (tv?'var(--accent)':'var(--muted)') + '">' + (tv||'-') + '</div><div class="ssub">dominadas</div></div>' +
    '<div class="stat rec"><div class="slabel">Record</div><div class="sval">' + (udata.pullBest||'-') + '</div><div class="ssub">mejor dia</div></div>';
}

function renderPullHistory() {
  var wrap = document.getElementById('pull-hgrid');
  wrap.innerHTML = '';
  var tk = tkey();
  var d = new Date(); d.setDate(d.getDate()-29);
  for (var i = 0; i < 30; i++) {
    var k = d.toLocaleDateString('en-CA', {timeZone:'Europe/Madrid'});
    var val = udata.pullLog[k] || 0;
    var isT = k === tk;
    var el = document.createElement('div');
    el.className = 'hday' + (val?' done':'') + (isT&&!val?' today':'');
    el.innerHTML = '<span>' + d.getDate() + '</span><div class="hdot"></div>' + (val?'<span class="htime">'+val+'</span>':'');
    wrap.appendChild(el);
    d.setDate(d.getDate()+1);
  }
}

function renderAll() {
  renderJokers();
  renderHangStats();
  renderHangHistory();
  renderPullStats();
  renderPullHistory();
}

if (uname) { udata = loadUser(uname); showMain(); }
</script>
</body>
</html>
